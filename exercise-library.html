<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Coach — Exercise Library</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808;
    --surface: #111111;
    --surface2: #181818;
    --border: #222222;
    --red: #e8303a;
    --red-dim: rgba(232,48,58,0.15);
    --red-glow: rgba(232,48,58,0.35);
    --text: #f0f0f0;
    --muted: #666;
    --muted2: #999;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background glow */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 800px; height: 500px;
    background: radial-gradient(ellipse, rgba(232,48,58,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8,8,8,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--text);
    position: relative;
  }
  .logo span { color: var(--red); }
  .logo::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 0;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, var(--red), transparent);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: var(--muted2);
  }
  .exercise-count {
    background: var(--red-dim);
    border: 1px solid var(--red-glow);
    color: var(--red);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* Main layout */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 24px;
    position: relative;
    z-index: 1;
  }

  /* Page title */
  .page-title {
    margin-bottom: 32px;
  }
  .page-title h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 5vw, 64px);
    letter-spacing: 3px;
    line-height: 1;
    margin-bottom: 8px;
  }
  .page-title h1 span { color: var(--red); }
  .page-title p {
    color: var(--muted2);
    font-size: 14px;
    font-style: italic;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    flex: 1;
    min-width: 220px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px 12px 42px;
    border-radius: 10px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap input:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px var(--red-dim);
  }
  .search-wrap input::placeholder { color: var(--muted); }

  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted2);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    font-family: 'DM Sans', sans-serif;
  }
  .filter-btn:hover {
    border-color: var(--red);
    color: var(--text);
  }
  .filter-btn.active {
    background: var(--red);
    border-color: var(--red);
    color: white;
    box-shadow: 0 4px 16px var(--red-glow);
  }

  /* Type filter */
  .type-filter {
    display: flex;
    gap: 6px;
  }
  .type-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted2);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.5px;
  }
  .type-btn:hover { border-color: #555; color: var(--text); }
  .type-btn.active {
    background: var(--surface2);
    border-color: #444;
    color: var(--text);
  }

  /* Results line */
  .results-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .results-count {
    font-size: 13px;
    color: var(--muted2);
  }
  .results-count strong { color: var(--text); }

  /* Grid */
  .exercise-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  /* Card */
  .ex-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .ex-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--red), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .ex-card:hover {
    border-color: #333;
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .ex-card:hover::before { opacity: 1; }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 8px;
  }

  .ex-name {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
    flex: 1;
  }

  .badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-compound {
    background: rgba(232,48,58,0.15);
    border: 1px solid rgba(232,48,58,0.3);
    color: var(--red);
  }
  .badge-isolation {
    background: rgba(255,255,255,0.05);
    border: 1px solid #333;
    color: var(--muted2);
  }

  .primary-muscle {
    font-size: 12px;
    color: var(--muted2);
    margin-bottom: 8px;
  }
  .primary-muscle strong {
    color: var(--red);
    font-weight: 600;
  }

  .muscle-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .muscle-tag {
    font-size: 11px;
    background: rgba(255,255,255,0.04);
    border: 1px solid #2a2a2a;
    color: var(--muted);
    padding: 2px 8px;
    border-radius: 4px;
  }
  .muscle-tag.primary {
    background: var(--red-dim);
    border-color: rgba(232,48,58,0.25);
    color: var(--red);
  }

  /* Detail panel */
  .detail-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .detail-overlay.open { display: flex; }

  .detail-panel {
    background: var(--surface);
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 32px;
    max-width: 540px;
    width: 100%;
    position: relative;
    max-height: 90vh;
    overflow-y: auto;
  }
  .detail-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--red), transparent);
    border-radius: 16px 16px 0 0;
  }

  .detail-close {
    position: absolute;
    top: 16px; right: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted2);
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .detail-close:hover { color: var(--text); border-color: #444; }

  .detail-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    margin-bottom: 4px;
    padding-right: 40px;
  }

  .detail-meta {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .detail-section {
    margin-bottom: 20px;
  }
  .detail-section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .detail-section-body {
    font-size: 14px;
    color: var(--muted2);
    line-height: 1.6;
  }

  .detail-muscles {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .detail-sets {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .set-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .set-box-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .set-box-value {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }
  .set-box-value span { color: var(--red); }

  /* Empty state */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty h3 { font-size: 18px; color: var(--muted2); margin-bottom: 6px; }
  .empty p { font-size: 14px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #444; }

  @media (max-width: 600px) {
    main { padding: 20px 16px; }
    .controls { flex-direction: column; }
    .filter-group, .type-filter { overflow-x: auto; flex-wrap: nowrap; }
    .exercise-grid { grid-template-columns: 1fr; }
    .detail-sets { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">IRON<span>COACH</span></div>
  <div class="header-right">
    <span class="exercise-count" id="totalCount">300+ EXERCISES</span>
  </div>
</header>

<main>
  <div class="page-title">
    <h1>EXERCISE <span>LIBRARY</span></h1>
    <p>Search by name, muscle, or movement type — find the right tool for every lift.</p>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search exercises, muscles, equipment...">
    </div>
    <div class="type-filter">
      <button class="type-btn active" data-type="all">All</button>
      <button class="type-btn" data-type="Compound">Compound</button>
      <button class="type-btn" data-type="Isolation">Isolation</button>
    </div>
  </div>

  <div class="filter-group" id="muscleFilters" style="margin-bottom:20px;"></div>

  <div class="results-bar">
    <div class="results-count">Showing <strong id="showingCount">0</strong> exercises</div>
  </div>

  <div class="exercise-grid" id="exerciseGrid"></div>
</main>

<!-- Detail Overlay -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel" id="detailPanel">
    <button class="detail-close" id="detailClose">✕</button>
    <div id="detailContent"></div>
  </div>
</div>

  { name:"Sled Push", type:"Compound", primary:"Full Body", secondary:["Quads","Glutes","Shoulders"], sets:"4", reps:"20–40m", rest:"2 min", cue:"Low hips, drive hard, great conditioning.", equipment:"Sled, Weight Plates" },
  { name:"Battle Ropes", type:"Compound", primary:"Full Body", secondary:["Shoulders","Arms","Core"], sets:"4", reps:"30–45 sec", rest:"60 sec", cue:"Alternating or double waves, maintain squat position.", equipment:"Battle Ropes" },
  { name:"Sandbag Carry", type:"Compound", primary:"Full Body", secondary:["Core","Traps","Forearms"], sets:"4", reps:"40–60m", rest:"90 sec", cue:"Hug the bag, keep core braced.", equipment:"Sandbag" },
  { name:"Tire Flip", type:"Compound", primary:"Full Body", secondary:["Back","Glutes","Shoulders"], sets:"3", reps:"6–10", rest:"2 min", cue:"Deadlift then push the tire overhead.", equipment:"Heavy Tire" },

  // ═══ CARDIO / CONDITIONING ═══
  { name:"Rowing Machine", type:"Compound", primary:"Full Body", secondary:["Back","Legs","Core"], sets:"1", reps:"20–60 min", rest:"N/A", cue:"60% legs, 20% back, 20% arms. Push with legs first.", equipment:"Rowing Ergometer" },
  { name:"Assault Bike", type:"Compound", primary:"Full Body", secondary:["Cardio","Legs","Arms"], sets:"1", reps:"20–40 min or intervals", rest:"N/A", cue:"Full body cardio — one of the hardest pieces of equipment.", equipment:"Assault Bike" },
  { name:"Ski Erg", type:"Compound", primary:"Full Body", secondary:["Back","Core","Arms"], sets:"1", reps:"20–40 min", rest:"N/A", cue:"Lat pull then hip hinge — simulate cross country skiing.", equipment:"Ski Erg" },
  { name:"Treadmill Sprint", type:"Compound", primary:"Full Body", secondary:["Cardio","Hamstrings","Calves"], sets:"8–10", reps:"20–30 sec", rest:"40–60 sec", cue:"High incline + high speed sprints for HIIT.", equipment:"Treadmill" },
  { name:"Stair Climber", type:"Compound", primary:"Full Body", secondary:["Glutes","Quads","Calves"], sets:"1", reps:"20–40 min", rest:"N/A", cue:"Steady state — great low-impact cardio.", equipment:"Stair Climber" },

  // ═══ STRETCHING / MOBILITY ═══
  { name:"Hip Flexor Stretch", type:"Isolation", primary:"Full Body", secondary:["Hip Flexors","Quads"], sets:"3", reps:"30–60 sec each", rest:"30 sec", cue:"Kneeling lunge, push hips forward, chest tall.", equipment:"Bodyweight" },
  { name:"Pigeon Pose", type:"Isolation", primary:"Full Body", secondary:["Glutes","Hip Flexors"], sets:"2", reps:"60–90 sec each", rest:"30 sec", cue:"Front shin parallel, square hips, breathe into it.", equipment:"Bodyweight" },
  { name:"Thoracic Spine Rotation", type:"Isolation", primary:"Full Body", secondary:["Back","Core"], sets:"3", reps:"10 each", rest:"30 sec", cue:"Thread needle or seated, open chest to ceiling.", equipment:"Bodyweight" },
  { name:"Ankle Mobility Drill", type:"Isolation", primary:"Full Body", secondary:["Calves","Achilles"], sets:"3", reps:"15–20 each", rest:"30 sec", cue:"Knee over pinky toe, improve squat depth.", equipment:"Bodyweight or Wall" },
  { name:"World's Greatest Stretch", type:"Compound", primary:"Full Body", secondary:["Hip Flexors","Thoracic Spine","Hamstrings"], sets:"3", reps:"5 each side", rest:"30 sec", cue:"Best all-in-one mobility drill for lifters.", equipment:"Bodyweight" },
];

const MUSCLE_GROUPS = ["All","Chest","Back","Shoulders","Biceps","Triceps","Quads","Hamstrings","Glutes","Calves","Core","Traps","Forearms","Full Body"];

let activeGroup = "All";
let activeType = "all";
let searchTerm = "";

function renderFilters() {
  const wrap = document.getElementById('muscleFilters');
  wrap.innerHTML = MUSCLE_GROUPS.map(g => `
    <button class="filter-btn${g===activeGroup?' active':''}" data-group="${g}">${g}</button>
  `).join('');
  wrap.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeGroup = btn.dataset.group;
      renderAll();
    });
  });
}

function filterExercises() {
  return EXERCISES.filter(ex => {
    const matchGroup = activeGroup === "All" || ex.primary === activeGroup;
    const matchType = activeType === "all" || ex.type === activeType;
    const q = searchTerm.toLowerCase();
    const matchSearch = !q ||
      ex.name.toLowerCase().includes(q) ||
      ex.primary.toLowerCase().includes(q) ||
      ex.secondary.some(s => s.toLowerCase().includes(q)) ||
      ex.type.toLowerCase().includes(q) ||
      (ex.equipment || "").toLowerCase().includes(q);
    return matchGroup && matchType && matchSearch;
  });
}

function renderGrid() {
  const exercises = filterExercises();
  const grid = document.getElementById('exerciseGrid');
  document.getElementById('showingCount').textContent = exercises.length;

  if (exercises.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h3>No exercises found</h3><p>Try a different search or filter.</p></div>`;
    return;
  }

  grid.innerHTML = exercises.map((ex, i) => `
    <div class="ex-card" data-index="${EXERCISES.indexOf(ex)}" style="animation-delay:${Math.min(i*0.02,0.3)}s">
      <div class="card-top">
        <div class="ex-name">${ex.name}</div>
        <span class="badge badge-${ex.type.toLowerCase()}">${ex.type}</span>
      </div>
      <div class="primary-muscle">Primary: <strong>${ex.primary}</strong></div>
      <div class="muscle-tags">
        <span class="muscle-tag primary">${ex.primary}</span>
        ${ex.secondary.map(s=>`<span class="muscle-tag">${s}</span>`).join('')}
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.ex-card').forEach(card => {
    card.addEventListener('click', () => {
      openDetail(parseInt(card.dataset.index));
    });
  });
}

function openDetail(index) {
  const ex = EXERCISES[index];
  const overlay = document.getElementById('detailOverlay');
  document.getElementById('detailContent').innerHTML = `
    <div class="detail-name">${ex.name}</div>
    <div class="detail-meta">
      <span class="badge badge-${ex.type.toLowerCase()}">${ex.type}</span>
    </div>
    <div class="detail-sets">
      <div class="set-box"><div class="set-box-label">Sets</div><div class="set-box-value">${ex.sets}</div></div>
      <div class="set-box"><div class="set-box-label">Reps</div><div class="set-box-value">${ex.reps}</div></div>
      <div class="set-box"><div class="set-box-label">Rest</div><div class="set-box-value">${ex.rest}</div></div>
    </div>
    <br>
    <div class="detail-section">
      <div class="detail-section-title">Primary Muscle</div>
      <div class="detail-muscles"><span class="muscle-tag primary">${ex.primary}</span></div>
    </div>
    ${ex.secondary.length ? `<div class="detail-section">
      <div class="detail-section-title">Secondary Muscles</div>
      <div class="detail-muscles">${ex.secondary.map(s=>`<span class="muscle-tag">${s}</span>`).join('')}</div>
    </div>` : ''}
    <div class="detail-section">
      <div class="detail-section-title">Equipment</div>
      <div class="detail-section-body">${ex.equipment}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Coaching Cue</div>
      <div class="detail-section-body">${ex.cue}</div>
    </div>
  `;
  overlay.classList.add('open');
}

function renderAll() {
  renderFilters();
  renderGrid();
}

// Events
document.getElementById('detailClose').addEventListener('click', () => {
  document.getElementById('detailOverlay').classList.remove('open');
});
document.getElementById('detailOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchTerm = e.target.value;
  renderAll();
});
document.querySelectorAll('.type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeType = btn.dataset.type;
    renderAll();
  });
});

document.getElementById('totalCount').textContent = EXERCISES.length + ' EXERCISES';
renderAll();
</script>
